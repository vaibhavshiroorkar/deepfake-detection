services:
  - type: web
    name: veritas-backend
    runtime: python
    plan: free
    region: oregon
    rootDir: backend
    buildCommand: pip install --upgrade pip && pip install -r requirements.txt
    startCommand: uvicorn app.main:app --host 0.0.0.0 --port $PORT
    healthCheckPath: /health
    envVars:
      - key: PYTHON_VERSION
        value: 3.11.9
      - key: ALLOWED_ORIGINS
        sync: false   # set to your Vercel URL, e.g. https://veritas.vercel.app
      - key: SUPABASE_URL
        sync: false
      - key: SUPABASE_SERVICE_ROLE_KEY
        sync: false
      # Paste the full JWK JSON string (one line) from Supabase → Project Settings → API → JWT Settings → JWKS
      - key: SUPABASE_JWT_PUBLIC_KEY
        sync: false
